<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1599a3" />
    <title>FitSphere Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #f8fafb;
        color: #172033;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 1;
      }

      p {
        margin: 16px 0 0;
        color: #64748b;
        line-height: 1.6;
      }

      button {
        margin-top: 24px;
        border: 0;
        border-radius: 8px;
        background: #1599a3;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        padding: 10px 16px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>FitSphere</h1>
      <p>
        You are offline. The app shell can load when cached, but live account and fitness data needs
        a secure connection.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
